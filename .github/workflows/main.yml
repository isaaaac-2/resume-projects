name: Security Vulnerability Scan

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:

  # ────────────────────────────────────────────────────────────
  # JOB 1: Trivy — Scan source code and dependencies
  # ────────────────────────────────────────────────────────────
  trivy-fs-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

  # ────────────────────────────────────────────────────────────
  # JOB 2: Snyk — Scan open-source dependencies
  # ────────────────────────────────────────────────────────────
  snyk-dependency-scan:
    name: Snyk Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Check for SNYK_TOKEN
        id: snyk-check
        run: |
          if [ -z "${{ secrets.SNYK_TOKEN }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️  SNYK_TOKEN not configured — skipping scan."
            echo "Add it: repo Settings → Secrets → New secret → SNYK_TOKEN"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Snyk scan
        if: steps.snyk-check.outputs.skip == 'false'
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # ────────────────────────────────────────────────────────────
  # JOB 3: Summary
  # ────────────────────────────────────────────────────────────
  scan-summary:
    name: Write Scan Summary
    runs-on: ubuntu-latest
    needs: [trivy-fs-scan, snyk-dependency-scan]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## 🔐 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Target | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy | Filesystem — source code + dependencies | ${{ needs.trivy-fs-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Snyk  | Node.js open-source dependencies        | ${{ needs.snyk-dependency-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Triggered by: \`${{ github.event_name }}\` on \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "> Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
