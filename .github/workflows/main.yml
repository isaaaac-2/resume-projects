name: Security Vulnerability Scan
 
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
 
# Required for SARIF upload to GitHub Security tab
permissions:
  contents: read
  security-events: write
  actions: read
 
jobs:
 
  # ────────────────────────────────────────────────────────────
  # JOB 1: Trivy — Scans the repo filesystem for known CVEs
  # ────────────────────────────────────────────────────────────
  trivy-fs-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'
 
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-fs'
 
      - name: Print summary to logs
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
 
  # ────────────────────────────────────────────────────────────
  # JOB 2: Trivy — Scans the Docker image
  # ────────────────────────────────────────────────────────────
  trivy-image-scan:
    name: Trivy Docker Image Scan
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Build Docker image for scanning
        run: docker build -t scan-target:${{ github.sha }} .
        continue-on-error: true
 
      - name: Run Trivy vulnerability scanner (image)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: 'scan-target:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
 
      - name: Upload image scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-image-results.sarif'
          category: 'trivy-image'
 
  # ────────────────────────────────────────────────────────────
  # JOB 3: Snyk — Scans open-source dependencies
  # ────────────────────────────────────────────────────────────
  snyk-dependency-scan:
    name: Snyk Dependency Scan
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
 
      - name: Install dependencies
        run: |
          if [ -f "package.json" ]; then
            npm install
          else
            echo "No package.json found — skipping"
          fi
 
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk-results.sarif
 
      - name: Upload Snyk results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk-results.sarif
          category: 'snyk-oss'
 
  # ────────────────────────────────────────────────────────────
  # JOB 4: Summary
  # ────────────────────────────────────────────────────────────
  scan-summary:
    name: Write Scan Summary
    runs-on: ubuntu-latest
    needs: [trivy-fs-scan, snyk-dependency-scan]
    if: always()
 
    steps:
      - name: Write summary
        run: |
          echo "## 🔐 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Target | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy   | Filesystem (source code + deps) | ${{ needs.trivy-fs-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Snyk    | Open-source dependencies        | ${{ needs.snyk-dependency-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Triggered by: \`${{ github.event_name }}\` on \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "> Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
 
